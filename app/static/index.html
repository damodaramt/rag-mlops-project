<!DOCTYPE html>
<html>
<head>
  <title>RAG AI Assistant</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #020617;
      padding: 15px;
      border-right: 1px solid #1e293b;
    }

    .sidebar h3 {
      margin-top: 0;
      color: #38bdf8;
    }

    .history-item {
      padding: 10px;
      margin-bottom: 5px;
      border-radius: 6px;
      cursor: pointer;
      background: #0f172a;
      font-size: 14px;
    }

    .history-item:hover {
      background: #1e293b;
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .message {
      max-width: 75%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
    }

    .bot {
      background: #1e293b;
      border-left: 4px solid #38bdf8;
    }

    .sources {
      margin-top: 10px;
      font-size: 12px;
      color: #94a3b8;
    }

    .input-box {
      display: flex;
      padding: 15px;
      background: #020617;
      border-top: 1px solid #1e293b;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 6px;
      border: none;
      background: #1e293b;
      color: white;
    }

    button {
      margin-left: 10px;
      padding: 12px 16px;
      background: #38bdf8;
      border: none;
      color: black;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }

    .typing {
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h3>Chat History</h3>
    <div id="history"></div>
  </div>

  <div class="chat-area">

    <div class="messages" id="chat"></div>

    <div class="input-box">
      <input id="question" placeholder="Ask anything..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

</div>

<script>

const chat = document.getElementById("chat");
const historyDiv = document.getElementById("history");

document.getElementById("question").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});


// ==============================
// 📜 LOAD HISTORY
// ==============================
async function loadHistory() {
  const res = await fetch("/history");
  const data = await res.json();

  historyDiv.innerHTML = "";

  data.reverse().forEach(item => {
    historyDiv.innerHTML += `
      <div class="history-item">${item.question}</div>
    `;
  });
}


// ==============================
// 🚀 STREAMING MESSAGE
// ==============================
async function sendMessage() {

  const input = document.getElementById("question");
  const question = input.value.trim();

  if (!question) return;

  chat.innerHTML += `<div class="message user">${question}</div>`;

  const id = "msg-" + Date.now();

  chat.innerHTML += `
    <div class="message bot" id="${id}">
      <span class="typing">🤖 Thinking smartly...</span>
    </div>
  `;

  input.value = "";
  input.focus();
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("/query", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ question })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    let botDiv = document.getElementById(id);
    botDiv.innerHTML = "";

    let fullText = "";
    let sources = [];

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      fullText += chunk;

      // detect sources
      if (fullText.includes("[SOURCES]")) {
        const parts = fullText.split("[SOURCES]");
        fullText = parts[0];

        try {
          sources = JSON.parse(parts[1] || "[]");
        } catch {
          sources = [];
        }
      }

      botDiv.innerText = fullText;
      chat.scrollTop = chat.scrollHeight;
    }

    // fallback if empty
    if (!fullText.trim()) {
      botDiv.innerText = "⚠️ No relevant information found in documents.";
    }

    // show sources
    if (sources.length > 0) {
      botDiv.innerHTML += `
        <div class="sources">
          📚 Sources:
          <ul>
            ${sources.map(s => `<li>${s}</li>`).join("")}
          </ul>
        </div>
      `;
    }

    loadHistory();

  } catch (err) {
    document.getElementById(id).innerHTML = "❌ Server error";
  }

  chat.scrollTop = chat.scrollHeight;
}


// INIT
loadHistory();

</script>

</body>
</html>
